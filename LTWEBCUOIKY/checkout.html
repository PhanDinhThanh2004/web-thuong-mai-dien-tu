<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán | TimeHouse</title>
    <style>
        /* CSS CHUNG */
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        header { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 99; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; color: #ff6600; text-decoration: none;}

        /* CSS TRANG CHECKOUT */
        .checkout-container { display: flex; gap: 30px; max-width: 1100px; margin: 40px auto; flex-wrap: wrap; padding: 0 20px;}
        .form-section, .order-summary { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-section { flex: 2; min-width: 300px; }
        .order-summary { flex: 1; min-width: 300px; height: fit-content; }
        
        h2 { color: #ff6600; margin-top: 0; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px;}
        button[type="submit"] { background: #ff6600; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button[type="submit"]:hover { background: #e65c00; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        td, th { padding: 12px 0; border-bottom: 1px solid #eee; text-align: left; }
        .total-row { display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #eee; padding-top: 20px;}
        .total-row h3 { color: #d32f2f; margin: 0; font-size: 22px;}
        
        footer { background: #333; color: #ccc; padding: 20px; text-align: center; margin-top: 50px; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>
    <header>
        <div class="top-header">
            <a href="index.html" class="logo">TimeHouse</a>
            <div class="header-actions" style="display: flex; gap: 20px; align-items: center;">
                <a href="giohang.html" style="text-decoration: none; color: #333;">
                    Giỏ hàng (<b id="cart-count" style="color: #ff6600;">0</b>)
                </a>
                <div id="user-links">
                    <a href="dangnhap.html">Đăng nhập</a> | <a href="dangky.html">Đăng ký</a>
                </div>
            </div>
        </div>
    </header>

    <div class="checkout-container">
        <div class="form-section">
            <h2>Thông tin giao hàng</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="cust-name">Họ và tên *</label>
                    <input type="text" id="cust-name" placeholder="Nhập họ và tên người nhận" required>
                </div>
                <div class="form-group">
                    <label for="cust-phone">Số điện thoại *</label>
                    <input type="tel" id="cust-phone" placeholder="Nhập số điện thoại liên hệ" required>
                </div>
                <div class="form-group">
                    <label for="cust-email">Email *</label>
                    <input type="email" id="cust-email" placeholder="Nhập địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label for="cust-address">Địa chỉ giao hàng *</label>
                    <input type="text" id="cust-address" placeholder="Nhập số nhà, tên đường, phường/xã, quận/huyện..." required>
                </div>

                <h2 style="margin-top: 40px;">Phương thức thanh toán</h2>
                <div class="form-group">
                    <select id="payment-method">
                        <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                        <option value="Chuyển khoản">Chuyển khoản ngân hàng</option>
                        <option value="Momo">Ví điện tử Momo</option>
                    </select>
                </div>

                <button type="submit">ĐẶT HÀNG NGAY</button>
            </form>
        </div>

        <div class="order-summary">
            <h2>Đơn hàng của bạn</h2>
            <table id="summary-table">
                <thead>
                    <tr>
                        <th style="width: 55%">Sản phẩm</th>
                        <th style="width: 15%; text-align: center;">SL</th>
                        <th style="width: 30%; text-align: right;">Giá</th>
                    </tr>
                </thead>
                <tbody id="summary-body">
                    </tbody>
            </table>
            <div class="total-row">
                <span style="font-weight: bold; font-size: 18px;">Tổng cộng:</span>
                <h3 id="summary-total">0đ</h3>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2024 TimeHouse - Website bán đồng hồ uy tín.
    </footer>

    <script src="main.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
