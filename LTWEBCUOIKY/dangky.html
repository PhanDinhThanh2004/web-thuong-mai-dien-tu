<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký | TimeHouse</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 350px; text-align: center;}
        
        /* Style cho hình ảnh mới thêm vào */
        .auth-image { max-width: 100%; height: auto; margin-bottom: 20px; }

        h2 { text-align: center; color: #ff6600; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff6600; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e55b00; }
        .link { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="img/anhnen.jpg" alt="TimeHouse Logo" class="auth-image">
        
        <h2>Đăng Ký</h2>
        <form onsubmit="handleRegister(event)">
            <input type="text" id="reg-username" placeholder="Tên đăng nhập" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Ký</button>
        </form>
        <div class="link">Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a></div>
        <div class="link"><a href="index.html">Về trang chủ</a></div>
    </div>

    <script src="main.js"></script>
    <script>
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.some(u => u.username === username)) {
                alert('Tên đăng nhập đã tồn tại!');
                return;
            }
            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            alert('Đăng ký thành công! Hãy đăng nhập.');
            window.location.href = 'dangnhap.html';
        }
    </script>
</body>
</html>
