<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng | TimeHouse</title>
    <style>
        /* CSS CHUNG */
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        
        /* HEADER */
        header { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 99; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; color: #ff6600; text-decoration: none;}
        
        /* CSS GIỎ HÀNG */
        .cart-container { width: 80%; max-width: 1000px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #ff6600; margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #f4f4f4; padding: 15px; text-align: left; font-weight: bold; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        /* Ảnh sản phẩm trong giỏ */
        .cart-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; margin-right: 10px; vertical-align: middle; }
        
        /* Nút tăng giảm số lượng */
        .qty-btn { width: 30px; height: 30px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; }
        .qty-btn:hover { background: #eee; }
        
        /* Tổng tiền */
        .total-price { text-align: right; font-size: 22px; font-weight: bold; color: #d32f2f; margin: 20px 0; }
        
        /* KHU VỰC NÚT BẤM (Sử dụng Flexbox thay vì float để không bị lỗi) */
        .action-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        
        .btn-back { text-decoration: none; color: #555; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-back:hover { color: #ff6600; }
        
        .btn-checkout { background: #ff6600; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none;}
        .btn-checkout:hover { background: #e65c00; box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3); }
        
        .btn-remove { color: #999; cursor: pointer; font-size: 14px; }
        .btn-remove:hover { color: red; text-decoration: underline; }
        
        /* Footer giả lập */
        footer { background: #333; color: #ccc; padding: 20px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="top-header">
            <a href="index.html" class="logo">TimeHouse</a>
            <div class="header-actions" style="display: flex; gap: 20px; align-items: center;">
                <a href="giohang.html" style="text-decoration: none; color: #333;">
                    Giỏ hàng (<b id="cart-count" style="color: #ff6600;">0</b>)
                </a>
                <div id="user-links">
                    <a href="dangnhap.html">Đăng nhập</a> | <a href="dangky.html">Đăng ký</a>
                </div>
            </div>
        </div>
    </header>

    <div class="cart-container">
        <h2>Giỏ Hàng Của Bạn</h2>
        
        <table id="cart-table">
            <thead>
                <tr>
                    <th style="width: 45%;">Sản phẩm</th>
                    <th style="width: 15%;">Giá</th>
                    <th style="width: 20%;">Số lượng</th>
                    <th style="width: 15%;">Thành tiền</th>
                    <th style="width: 5%;"></th>
                </tr>
            </thead>
            <tbody id="cart-body">
                </tbody>
        </table>

        <div class="total-price" id="cart-total">Tổng cộng: 0đ</div>

        <div class="action-buttons">
            <a href="sanpham.html" class="btn-back">← Tiếp tục mua sắm</a>
            <button onclick="checkout()" class="btn-checkout">Tiến hành thanh toán</button>
        </div>
    </div>

    <footer>
        &copy; 2024 TimeHouse - Website bán đồng hồ uy tín.
    </footer>

    <script src="main.js"></script>
    <script>
        // Hàm hiển thị giỏ hàng
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const tbody = document.getElementById('cart-body');
            const totalEl = document.getElementById('cart-total');
            
            tbody.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: #777;">Giỏ hàng của bạn đang trống.<br><a href="sanpham.html" style="color:#ff6600">Mua ngay</a></td></tr>';
                totalEl.style.display = 'none'; // Ẩn tổng tiền nếu trống
            } else {
                totalEl.style.display = 'block';
                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;
                    
                    // Nếu ảnh lỗi hoặc không có, dùng ảnh mặc định
                    let imgPath = item.image; 
                    if(!imgPath || imgPath === 'undefined') imgPath = 'https://via.placeholder.com/60';

                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <img src="${imgPath}" class="cart-img" onerror="this.src='https://via.placeholder.com/60'">
                                <b>${item.name}</b>
                            </td>
                            <td>${item.price.toLocaleString('vi-VN')}đ</td>
                            <td>
                                <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <span style="margin: 0 10px; font-weight: bold;">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </td>
                            <td style="color: #d32f2f; font-weight: bold;">${itemTotal.toLocaleString('vi-VN')}đ</td>
                            <td><span class="btn-remove" onclick="removeFromCart(${index})">✕</span></td>
                        </tr>
                    `;
                });
            }
            totalEl.innerText = `Tổng cộng: ${total.toLocaleString('vi-VN')}đ`;
            updateCartCount(); 
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart[index].quantity + change > 0) {
                cart[index].quantity += change;
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function removeFromCart(index) {
            if(confirm('Xóa sản phẩm này khỏi giỏ hàng?')) {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function checkout() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(cart.length === 0) return alert('Giỏ hàng trống!');
            
            if (!localStorage.getItem('currentUser')) {
                alert('Vui lòng đăng nhập để thanh toán!');
                window.location.href = 'dangnhap.html';
                return;
            }
            // Đã sửa đổi: Chuyển hướng sang trang thanh toán thay vì kết thúc luôn
            window.location.href = 'checkout.html';
        }

        renderCart();
    </script>
</body>
</html>
